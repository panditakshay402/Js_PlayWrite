<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>

    <script>
        function msg() {
            let msg = "Hello Akshay";

            document.getElementById("demo").innerHTML = msg;
        }
    </script>

</head>

<body>

    <p id="demo">Old Text</p>

    <button onclick="msg()">Click Me</button>

</body>

</html>
